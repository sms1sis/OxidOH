name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c
        add-to-path: true

    - name: Build Rust Core
      run: |
        export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
        chmod +x build_android.sh
        ./build_android.sh
      env:
        RUSTFLAGS: "-C target-cpu=generic -C target-feature=+neon --cfg reqwest_unstable"

    - name: Decode Keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

    - name: Build Android App
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Get Version Name
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" android/app/build.gradle | head -n 1 | awk -F'"' '{print $2}')
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        mv android/app/build/outputs/apk/release/app-release.apk OxidOH-ODoH-armv8a-v${{ steps.version.outputs.version }}-${{ steps.date.outputs.date }}.apk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OxidOH-Release-APK
        path: OxidOH-ODoH-armv8a-v${{ steps.version.outputs.version }}-${{ steps.date.outputs.date }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        files: OxidOH-ODoH-armv8a-v${{ steps.version.outputs.version }}-${{ steps.date.outputs.date }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
